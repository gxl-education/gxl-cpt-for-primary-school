<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儿童持续注意力测试 CPT</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',Arial,sans-serif; background:#0d1b2a; color:#fff; min-height:100vh; overflow:hidden; user-select:none; }
#bg { position:fixed; inset:0; z-index:0; background:linear-gradient(160deg,#0d1b2a 0%,#0f2540 60%,#0a2a1a 100%); }
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:.1} 50%{opacity:.6} }
.screen { position:fixed; inset:0; z-index:10; flex-direction:column; align-items:center; justify-content:center; padding:24px; display:none; }
.screen.active { display:flex; }
.card { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.14); border-radius:24px; padding:36px 44px; max-width:660px; width:100%; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
h1 { font-size:2.2rem; font-weight:900; color:#ffd166; margin-bottom:6px; }
h2 { font-size:1.6rem; font-weight:800; color:#7ec8e3; margin-bottom:14px; }
.sub { color:#7ec8e3; opacity:.65; font-size:.9rem; }
.btn { display:inline-block; padding:12px 30px; border-radius:50px; border:none; cursor:pointer; font-size:1rem; font-weight:700; transition:transform .12s,box-shadow .12s; font-family:inherit; }
.btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.3); }
.btn:active { transform:none; }
.btn-y { background:#ffd166; color:#1a1a2e; }
.btn-g { background:#06d6a0; color:#0d1b2a; }
.btn-s { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.2); }
.btn-r { background:rgba(224,95,95,.15); color:#e05f5f; border:1px solid rgba(224,95,95,.3); }
.btn-row { display:flex; gap:12px; flex-wrap:wrap; margin-top:20px; }
.field { margin:11px 0; }
.field label { display:block; font-size:.85rem; color:#7ec8e3; font-weight:700; margin-bottom:5px; }
.field input,.field select { width:100%; padding:10px 14px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.18); border-radius:10px; color:#fff; font-family:inherit; font-size:.95rem; outline:none; }
.field input:focus,.field select:focus { border-color:#7ec8e3; }
.field select option { background:#0f2540; }
.demo { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:14px; padding:16px 20px; margin:10px 0; text-align:center; }
.demo-stim { font-size:3.5rem; margin:6px 0; line-height:1.2; }
.demo-desc { font-size:.82rem; color:rgba(255,255,255,.5); }
#test-screen { background:#0a0f1a; }
.hud { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:14px 28px; z-index:30; pointer-events:none; }
.hud-txt { font-size:.75rem; color:rgba(255,255,255,.25); font-weight:700; }
.prog-bar { width:140px; height:4px; border-radius:2px; background:rgba(255,255,255,.07); overflow:hidden; }
.prog-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,#7ec8e3,#06d6a0); transition:width .4s; }
#stim-wrap { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; }
#fixation { font-size:2.8rem; color:rgba(255,255,255,.3); }
#stim-el { font-size:9rem; font-weight:900; color:#fff; line-height:1; display:none; }
#ax-cue { position:fixed; top:calc(50% - 130px); left:50%; transform:translateX(-50%); font-size:.82rem; font-weight:700; letter-spacing:1px; color:rgba(255,255,255,.2); z-index:25; display:none; }
.ptag { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); font-size:.7rem; color:rgba(255,255,255,.18); letter-spacing:2px; z-index:25; }
@keyframes fG { 0%,100%{background:#0a0f1a} 50%{background:rgba(6,214,160,.12)} }
@keyframes fR { 0%,100%{background:#0a0f1a} 50%{background:rgba(224,95,95,.15)} }
.fl-g { animation:fG .22s; } .fl-r { animation:fR .22s; }
.tab-bar { display:flex; gap:7px; margin-bottom:16px; }
.tab-btn { padding:6px 14px; border-radius:7px; border:none; cursor:pointer; font-size:.8rem; font-weight:700; font-family:inherit; background:rgba(255,255,255,.07); color:rgba(255,255,255,.45); transition:all .12s; }
.tab-btn.active { background:#1a6b9a; color:#fff; }
.tbl { width:100%; border-collapse:collapse; font-size:.78rem; }
.tbl th { background:rgba(255,255,255,.07); padding:8px 10px; text-align:left; color:#7ec8e3; font-weight:700; border-bottom:1px solid rgba(255,255,255,.09); }
.tbl td { padding:7px 10px; border-bottom:1px solid rgba(255,255,255,.04); color:rgba(255,255,255,.72); }
.tbl tr:hover td { background:rgba(255,255,255,.03); }
.scroll { max-height:260px; overflow-y:auto; }
.scroll::-webkit-scrollbar { width:3px; }
.scroll::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:2px; }
.ng { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:8px 0; }
.nb { background:rgba(255,255,255,.05); border-radius:9px; padding:10px; text-align:center; }
.nbl { font-size:.68rem; color:#7ec8e3; } .nbv { font-size:1.1rem; font-weight:800; color:#ffd166; } .nbs { font-size:.65rem; color:rgba(255,255,255,.3); }
.tag { display:inline-block; padding:2px 6px; border-radius:5px; font-size:.68rem; font-weight:700; }
.tag-f { background:rgba(255,209,102,.18); color:#ffd166; }
.tag-o { background:rgba(6,214,160,.13); color:#06d6a0; }
.tag-n { background:rgba(126,200,227,.1); color:#7ec8e3; }
.hidden { display:none !important; }
</style>
</head>
<body>
<div id="bg"></div>
<div class="screen active" id="welcome-screen">
  <div class="card" style="text-align:center">
    <div style="font-size:4rem;margin-bottom:8px">🎯</div>
    <h1>注意力小测试</h1>
    <p class="sub" style="margin-bottom:26px">儿童持续注意力测试（CPT）</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-y" onclick="go('info-screen')">▶ 开始测试</button>
      <button class="btn btn-s" onclick="adminLogin()">🔒 管理员</button>
    </div>
    <p style="margin-top:18px;font-size:.72rem;color:rgba(255,255,255,.22)">测试时长 8–10 分钟 · 请在安静环境完成</p>
  </div>
</div>
<div class="screen" id="info-screen">
  <div class="card">
    <h2>👋 告诉我们你是谁</h2>
    <div class="field"><label>学生编号（由老师告知）</label><input id="f-id" type="text" placeholder="例：1-03-12" maxlength="20"></div>
    <div class="field"><label>年级</label>
      <select id="f-grade" onchange="autoAge()">
        <option value="">请选择</option>
        <option value="1">一年级</option><option value="2">二年级</option>
        <option value="3">三年级</option><option value="4">四年级</option>
        <option value="5">五年级</option><option value="6">六年级</option>
      </select></div>
    <div class="field"><label>年龄（岁）</label><input id="f-age" type="number" min="6" max="14" placeholder="例：8"></div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="go('welcome-screen')">← 返回</button>
      <button class="btn btn-y" onclick="toInstructions()">下一步 →</button>
    </div>
  </div>
</div>
<div class="screen" id="instruct-screen">
  <div class="card">
    <h2 id="inst-h">🎮 游戏说明</h2>
    <div id="inst-body"></div>
    <div class="btn-row">
      <button class="btn btn-s" onclick="go('info-screen')">← 返回</button>
      <button class="btn btn-y" onclick="startPractice()">开始练习 →</button>
    </div>
  </div>
</div>
<div class="screen" id="test-screen">
  <div class="hud">
    <span class="hud-txt" id="h-phase">练习</span>
    <div class="prog-bar"><div class="prog-fill" id="h-prog" style="width:0%"></div></div>
    <span class="hud-txt" id="h-cnt"></span>
  </div>
  <div id="ax-cue"></div>
  <div id="stim-wrap"><div id="fixation">+</div><div id="stim-el"></div></div>
  <div class="ptag" id="ptag"></div>
</div>
<div class="screen" id="break-screen">
  <div class="card" style="text-align:center">
    <div style="font-size:3rem;margin-bottom:8px">☕</div>
    <h2>休息一下！</h2>
    <p style="color:#7ec8e3;margin:10px 0 22px;line-height:1.9" id="break-msg"></p>
    <button class="btn btn-g" onclick="startFormal()">我准备好了，继续！</button>
  </div>
</div>
<div class="screen" id="result-screen">
  <div class="card" style="text-align:center;max-width:500px">
    <div style="font-size:5rem;margin-bottom:16px">🎉</div>
    <h1 style="font-size:2rem;margin-bottom:12px">测试完成！</h1>
    <p style="font-size:1.2rem;color:#7ec8e3;line-height:1.8;margin-bottom:32px">感谢你的坚持！<br>你真的很棒！</p>
    <button class="btn btn-g" style="font-size:1.1rem;padding:14px 40px" onclick="go('welcome-screen');resetAll()">🏠 返回首页</button>
  </div>
</div>
<div class="screen" id="admin-screen">
  <div class="card" style="max-width:880px;padding:26px 32px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin-bottom:0">📊 数据管理</h2>
      <button class="btn btn-s" style="padding:6px 14px;font-size:.82rem" onclick="go('welcome-screen')">← 返回</button>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('t-norm',this)">常模概览</button>
      <button class="tab-btn" onclick="switchTab('t-records',this)">个案记录</button>
      <button class="tab-btn" onclick="switchTab('t-export',this)">数据导出</button>
    </div>
    <div id="t-norm"><div id="norm-area"></div></div>
    <div id="t-records" class="hidden">
      <div class="scroll">
        <table class="tbl">
          <thead><tr><th>编号</th><th>年龄</th><th>年级</th><th>范式</th><th>VAQ</th><th>VRCQ</th><th>命中率</th><th>漏报%</th><th>虚报%</th><th>状态</th><th>日期</th></tr></thead>
          <tbody id="rec-body"></tbody>
        </table>
      </div>
    </div>
    <div id="t-export" class="hidden">
      <p style="color:#7ec8e3;margin-bottom:12px">导出全部原始数据（CSV），或导入其他设备的CSV合并数据。</p>
      <div class="btn-row">
        <button class="btn btn-y" onclick="exportAll()">⬇ 导出全部 CSV</button>
        <button class="btn btn-s" onclick="document.getElementById('csv-in').click()">📥 导入 CSV</button>
      </div>
      <input type="file" id="csv-in" accept=".csv" style="display:none" onchange="importCSV(this)">
      <p style="font-size:.75rem;color:rgba(255,255,255,.3);margin-top:10px">导入后自动合并并重算常模。</p>
      <div style="margin-top:16px"><button class="btn btn-r" onclick="clearAll()">🗑 清空所有数据</button></div>
    </div>
  </div>
</div>
<script>
'use strict';
const MIN_N=30,MAX_N=1000,SK='cpt_recs_v3',NK='cpt_norm_v3';
const PAR={
  picture:{name:'图案版',target:'🐱',distractors:['🐶','🐰','🐻','🦊','🐸','🐼','🐨'],totalN:200,pracN:24,tRatio:0.40,isi:1500,stimMs:200},
  x:{name:'X版',target:'X',distractors:['A','B','C','D','E','F','G','H','K','L','M','N','P','Q','R','S','T'],totalN:300,pracN:30,tRatio:0.25,isiList:[500,1000,1500],stimMs:150},
  ax:{name:'AX版',target:'X',cue:'A',letters:['A','B','C','D','E','F','G','H','K','L','M','N','P','Q','R','S','T','X'],totalN:300,pracN:30,tRatio:0.25,isiList:[500,1000,1500],stimMs:150}
};
function gradeToParadigm(g){return g<=2?'picture':g<=4?'x':'ax';}
function ageGroup(a){return a<=7?'6-7':a<=9?'8-9':a<=11?'10-11':'12+';}
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
function lsDel(k){try{localStorage.removeItem(k);}catch(e){}}
function loadRecs(){try{return JSON.parse(lsGet(SK)||'[]');}catch(e){return[];}}
function saveRec(r){const a=loadRecs();a.push(r);lsSet(SK,JSON.stringify(a));recomputeNorm(a);}
function loadNorm(){try{return JSON.parse(lsGet(NK)||'{}');}catch(e){return{};}}
const MK_NORM=['HR','rtSD','FAR'];
function calcNorm(sub){
  if(sub.length<MIN_N)return null;
  const n={};
  MK_NORM.forEach(k=>{
    const v=sub.map(r=>r[k]).filter(x=>x!=null&&!isNaN(x));
    if(v.length<MIN_N){n[k]=null;return;}
    const mean=v.reduce((a,b)=>a+b,0)/v.length;
    const sd=Math.sqrt(v.reduce((a,b)=>a+(b-mean)**2,0)/v.length);
    n[k]={mean,sd,n:v.length};
  });
  return n;
}
function recomputeNorm(recs){
  const cache=loadNorm();
  ['6-7','8-9','10-11','12+'].forEach(g=>{
    if(cache[g]?._frozen)return;
    const sub=recs.filter(r=>r.ag===g);
    const n=calcNorm(sub);
    if(n){n._frozen=sub.length>=MAX_N;n._n=sub.length;cache[g]=n;}
  });
  lsSet(NK,JSON.stringify(cache));
}
function getNorm(ag){const c=loadNorm();return c[ag]||calcNorm(loadRecs())||null;}
function zScore(val,ne,hb){if(!ne||ne.sd===0)return null;const z=(val-ne.mean)/ne.sd;return hb?z:-z;}
function calcQuotients(raw,norm){
  if(!norm)return{VAQ:null,VRCQ:null};
  const zHR=zScore(raw.HR,norm.HR,true);
  const zRTSD=zScore(raw.rtSD,norm.rtSD,false);
  const zFAR=zScore(raw.FAR,norm.FAR,false);
  const VAQ_z=(zHR!==null&&zRTSD!==null)?zHR*0.6+zRTSD*0.4:(zHR??zRTSD);
  const VRCQ_z=(zFAR!==null&&zHR!==null)?zFAR*0.7+zHR*0.3:(zFAR??zHR);
  const toQ=z=>z!==null?Math.round(z*15+100):null;
  return{VAQ:toQ(VAQ_z),VRCQ:toQ(VRCQ_z)};
}
function flagQuotient(q){if(q===null)return'n';if(q<80)return'high';if(q<85)return'flag';return'ok';}
function buildTrials(pKey,isPrac){
  const cfg=PAR[pKey],N=isPrac?cfg.pracN:cfg.totalN,trials=[];
  if(pKey==='picture'||pKey==='x'){
    const tN=Math.round(N*cfg.tRatio),dN=N-tN;
    for(let i=0;i<tN;i++)trials.push({tp:'t',s:cfg.target});
    for(let i=0;i<dN;i++)trials.push({tp:'d',s:cfg.distractors[i%cfg.distractors.length]});
    shuffle(trials);
    const iList=cfg.isiList||[cfg.isi];
    trials.forEach((t,i)=>{t.isi=iList[i%iList.length];});
  } else {
    const axN=Math.round(N*cfg.tRatio/2),bxN=Math.round(N*0.10),ayN=Math.round(N*0.08);
    const nonA=cfg.letters.filter(l=>l!=='A'&&l!=='X'),nonX=cfg.letters.filter(l=>l!=='X');
    const pairs=[];
    for(let i=0;i<axN;i++)pairs.push('AX');
    for(let i=0;i<bxN;i++)pairs.push('BX');
    for(let i=0;i<ayN;i++)pairs.push('AY');
    shuffle(pairs);
    pairs.forEach(p=>{
      if(p==='AX'){trials.push({tp:'cue',s:'A'});trials.push({tp:'t',s:'X'});}
      else if(p==='BX'){trials.push({tp:'nc',s:nonA[rnd(nonA.length)]});trials.push({tp:'lure',s:'X'});}
      else{trials.push({tp:'cue',s:'A'});trials.push({tp:'lure2',s:nonX[rnd(nonX.length)]});}
    });
    const fill=N-trials.length;
    for(let i=0;i<fill;i++)trials.push({tp:'d',s:nonA[rnd(nonA.length)]});
    trials.forEach((t,i)=>{t.isi=cfg.isiList[i%cfg.isiList.length];});
  }
  return trials;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function rnd(n){return Math.floor(Math.random()*n);}
let S={},TM=null,waiting=false,onset=0;
function autoAge(){const g=parseInt(document.getElementById('f-grade').value);if(g)document.getElementById('f-age').value=[0,6,7,8,9,10,11][g]||'';}
function toInstructions(){
  const id=document.getElementById('f-id').value.trim();
  const gr=document.getElementById('f-grade').value;
  const ag=parseInt(document.getElementById('f-age').value);
  if(!id||!gr||!ag||ag<6||ag>14){alert('请填写完整的学生编号、年级和年龄（6–14岁）');return;}
  S={id,grade:parseInt(gr),age:ag,ag:ageGroup(ag),par:gradeToParadigm(parseInt(gr))};
  renderInst(S.par);go('instruct-screen');
}
function renderInst(p){
  if(p==='picture'){
    document.getElementById('inst-body').innerHTML=`
      <p style="line-height:1.9;margin-bottom:12px">屏幕上会一个一个出现小动物 🐾<br>只有一种动物需要按键：</p>
      <div class="demo"><div class="demo-stim">🐱</div>
        <div class="demo-desc">看到 <strong style="color:#ffd166">小猫咪</strong> → 按 <strong style="color:#ffd166">空格键</strong></div></div>
      <div class="demo" style="margin-top:8px"><div class="demo-stim" style="font-size:2.5rem">🐶 🐰 🐻 🦊</div>
        <div class="demo-desc">看到 <strong style="color:#7ec8e3">其他动物</strong> → <strong style="color:#7ec8e3">不要按</strong></div></div>
      <p style="margin-top:12px;font-size:.85rem;color:rgba(255,255,255,.45)">要又快又准！先练习再开始正式测试。</p>`;
  } else if(p==='x'){
    document.getElementById('inst-body').innerHTML=`
      <p style="line-height:1.9;margin-bottom:12px">屏幕上会一个一个出现字母。只有一种字母需要按键：</p>
      <div class="demo"><div class="demo-stim" style="color:#ffd166">X</div>
        <div class="demo-desc">看到字母 <strong style="color:#ffd166">X</strong> → 按 <strong style="color:#ffd166">空格键</strong></div></div>
      <div class="demo" style="margin-top:8px"><div class="demo-stim" style="font-size:3rem;color:#7ec8e3;letter-spacing:6px">A B C …</div>
        <div class="demo-desc">看到 <strong style="color:#7ec8e3">其他字母</strong> → <strong style="color:#7ec8e3">不要按</strong></div></div>
      <p style="margin-top:12px;font-size:.85rem;color:rgba(255,255,255,.45)">要又快又准！先练习再开始正式测试。</p>`;
  } else {
    document.getElementById('inst-body').innerHTML=`
      <p style="line-height:1.9;margin-bottom:12px">屏幕上会一个一个出现字母。按键规则只有一条：</p>
      <div class="demo"><div class="demo-stim"><span style="color:#ef8c5a">A</span>&nbsp;<span style="color:#ffd166">X</span></div>
        <div class="demo-desc">先出现 <strong style="color:#ef8c5a">A</strong>，紧接着出现 <strong style="color:#ffd166">X</strong> → 按 <strong style="color:#ffd166">空格键</strong></div></div>
      <div class="demo" style="margin-top:8px;font-size:.88rem;line-height:2.1;color:rgba(255,255,255,.65)">
        X前面不是A → 不按 ｜ A后面不是X → 不按 ｜ 其他字母 → 不按</div>
      <p style="margin-top:12px;font-size:.85rem;color:rgba(255,255,255,.45)">需要记住上一个字母！先练习再开始正式测试。</p>`;
  }
}
function startPractice(){
  S.isPrac=true;S.done=false;S.trials=buildTrials(S.par,true);
  S.idx=0;S.resps=[];S.prev=null;
  document.getElementById('h-phase').textContent='练 习';
  document.getElementById('ptag').textContent='PRACTICE';
  go('test-screen');nextTrial();
}
function startFormal(){
  S.isPrac=false;S.done=false;S.trials=buildTrials(S.par,false);
  S.idx=0;S.resps=[];S.prev=null;
  document.getElementById('h-phase').textContent='正 式 测 试';
  document.getElementById('ptag').textContent=PAR[S.par].name.toUpperCase();
  go('test-screen');nextTrial();
}
function nextTrial(){
  clearTimeout(TM);waiting=false;
  if(S.done)return;
  const trials=S.trials,idx=S.idx;
  document.getElementById('h-prog').style.width=Math.min(100,idx/trials.length*100)+'%';
  document.getElementById('h-cnt').textContent=idx+'/'+trials.length;
  if(idx>=trials.length){
    if(S.isPrac){
      const cfg=PAR[S.par];
      const avgISI=cfg.isiList?cfg.isiList.reduce((a,b)=>a+b,0)/cfg.isiList.length:cfg.isi;
      const mins=Math.round((cfg.totalN*(avgISI+cfg.stimMs))/60000);
      document.getElementById('break-msg').innerHTML=
        `你做得很棒！🎉<br>练习结束，接下来是正式测试。<br>
        <span style="font-size:.82rem;color:rgba(255,255,255,.38)">共${cfg.totalN}题，约${mins}分钟，准备好就继续！</span>`;
      go('break-screen');
    } else {
      S.done=true;
      document.getElementById('h-cnt').textContent='保存中…';
      finishTest();
    }
    return;
  }
  const t=trials[idx];
  const stimMs=PAR[S.par].stimMs;
  const postWait=Math.max(200,t.isi-stimMs);
  const totalCycle=t.isi+stimMs+postWait;
  const axEl=document.getElementById('ax-cue');
  if(S.par==='ax'){
    axEl.style.display='block';
    axEl.textContent=S.prev==='A'?'⚠ 上一个是 A！':'';
    axEl.style.color=S.prev==='A'?'rgba(239,140,90,.65)':'rgba(255,255,255,.18)';
  } else {axEl.style.display='none';}
  const fix=document.getElementById('fixation');
  const stEl=document.getElementById('stim-el');
  stEl.style.display='none';stEl.textContent='';
  fix.style.display='block';fix.textContent='+';
  const trialStart=performance.now();
  function tick(){
    const elapsed=performance.now()-trialStart;
    if(elapsed<t.isi){TM=setTimeout(tick,t.isi-elapsed);return;}
    if(elapsed<t.isi+stimMs){
      if(stEl.style.display==='none'){
        stEl.textContent=t.s;
        stEl.style.fontSize=S.par==='picture'?'8rem':'9rem';
        stEl.style.fontWeight=S.par==='picture'?'400':'900';
        fix.style.display='none';stEl.style.display='block';
        waiting=true;onset=performance.now();
      }
      TM=setTimeout(tick,t.isi+stimMs-elapsed);return;
    }
    if(elapsed<totalCycle){
      if(stEl.style.display!=='none'){stEl.style.display='none';fix.style.display='block';}
      if(waiting){TM=setTimeout(tick,totalCycle-elapsed);}
      else{advanceTrial();}
      return;
    }
    if(waiting){waiting=false;if(!S.isPrac)logResp(t,false,null);}
    advanceTrial();
  }
  function advanceTrial(){S.prev=t.s;S.idx++;TM=setTimeout(nextTrial,0);}
  TM=setTimeout(tick,0);
}

function flash(ok){const ts=document.getElementById('test-screen');ts.classList.remove('fl-g','fl-r');void ts.offsetWidth;ts.classList.add(ok?'fl-g':'fl-r');}
function logResp(t,pressed,rt){S.resps.push({tp:t?t.tp:'isi',s:t?t.s:null,pressed,rt,hit:t&&t.tp==='t'&&pressed,miss:t&&t.tp==='t'&&!pressed,fa:(t&&t.tp!=='t'&&pressed)||(!t&&pressed),cr:t&&t.tp!=='t'&&!pressed});}
function computeMetrics(resps){
  const tgts=resps.filter(r=>r.tp==='t');
  const nTgts=resps.filter(r=>r.tp!=='t'&&r.tp!=='isi');
  const hits=tgts.filter(r=>r.hit).length;
  const miss=tgts.filter(r=>r.miss).length;
  const fa=resps.filter(r=>r.fa).length;
  const HR=tgts.length?hits/tgts.length:0;
  const FAR=nTgts.length?fa/nTgts.length:0;
  const omR=Math.round((1-HR)*1000)/10;
  const comR=Math.round(FAR*1000)/10;
  const hitRTs=tgts.filter(r=>r.hit&&r.rt>80&&r.rt<1600).map(r=>r.rt);
  const rtM=hitRTs.length?hitRTs.reduce((a,b)=>a+b,0)/hitRTs.length:null;
  const rtSD=hitRTs.length>1?Math.sqrt(hitRTs.reduce((a,b)=>a+(b-rtM)**2,0)/hitRTs.length):null;
  function zInv(p){
    const pp=Math.max(.001,Math.min(.999,p));
    const c=[2.515517,0.802853,0.010328],d=[1.432788,0.189269,0.001308];
    const t=Math.sqrt(-2*Math.log(pp<.5?pp:1-pp));
    const z=t-(c[0]+c[1]*t+c[2]*t*t)/(1+d[0]*t+d[1]*t*t+d[2]*t*t*t);
    return pp<.5?-z:z;
  }
  const dp=zInv(Math.max(.001,Math.min(.999,HR)))-zInv(Math.max(.001,Math.min(.999,FAR)));
  const half=Math.floor(tgts.length/2);
  const first=tgts.slice(0,half),second=tgts.slice(half);
  const HR1=first.length?first.filter(r=>r.hit).length/first.length:null;
  const HR2=second.length?second.filter(r=>r.hit).length/second.length:null;
  const rt1=first.filter(r=>r.hit&&r.rt>80&&r.rt<1600).map(r=>r.rt);
  const rt2=second.filter(r=>r.hit&&r.rt>80&&r.rt<1600).map(r=>r.rt);
  const rtM1=rt1.length?rt1.reduce((a,b)=>a+b,0)/rt1.length:null;
  const rtM2=rt2.length?rt2.reduce((a,b)=>a+b,0)/rt2.length:null;
  const persistence=(HR1&&HR2&&rtM1&&rtM2)?Math.round((HR2/HR1)*(rtM1/rtM2)*100)/100:null;
  const sz=Math.floor(resps.length/3);
  const segs=[0,1,2].map(i=>{const s=resps.slice(i*sz,(i+1)*sz).filter(r=>r.tp==='t');return s.length?Math.round(s.filter(r=>r.miss).length/s.length*1000)/10:null;});
  const decayFlag=segs[0]!==null&&segs[2]!==null&&(segs[2]-segs[0])>15;
  return{HR:Math.round(HR*1000)/1000,FAR:Math.round(FAR*1000)/1000,rtSD:rtSD?Math.round(rtSD):null,omR,comR,rtM:rtM?Math.round(rtM):null,dp:Math.round(dp*100)/100,persistence,segs,decayFlag,hits,miss,fa,nT:tgts.length,nNT:nTgts.length};
}
function finishTest(){
  const m=computeMetrics(S.resps);
  const norm=getNorm(S.ag);
  const rec={id:S.id,grade:S.grade,age:S.age,ag:S.ag,par:S.par,HR:m.HR,FAR:m.FAR,rtSD:m.rtSD,omR:m.omR,comR:m.comR,rtM:m.rtM,dp:m.dp,date:new Date().toLocaleDateString('zh-CN'),ts:Date.now()};
  saveRec(rec);
  const{VAQ,VRCQ}=calcQuotients(m,norm);
  S.lastRec=rec;S.lastM=m;S.lastVAQ=VAQ;S.lastVRCQ=VRCQ;
  go('result-screen');
}

function importCSV(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').slice(1).filter(l=>l.trim());
    const existing=loadRecs();
    const keys=new Set(existing.map(r=>r.id+'_'+r.date));
    const merged=[...existing];let added=0;
    lines.forEach(line=>{
      const c=line.split(',');if(c.length<10)return;
      const rec={id:c[0],age:+c[1],grade:+c[2],ag:c[3]||ageGroup(+c[1]),par:c[4]||'x',HR:+c[7]||0,FAR:+c[8]||0,rtSD:c[9]?+c[9]:null,omR:+c[12]||0,comR:+c[13]||0,rtM:c[10]?+c[10]:null,dp:+c[11]||0,date:(c[14]||'').trim(),ts:Date.now()+added};
      if(!keys.has(rec.id+'_'+rec.date)){merged.push(rec);added++;}
    });
    lsSet(SK,JSON.stringify(merged));recomputeNorm(merged);
    alert(`导入完成，新增${added}条记录。`);renderAdmin();
  };
  reader.readAsText(file,'utf-8');
}

function dlText(text,fname){
  const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
  const isFile=location.protocol==='file:';
  if(!isSafari&&!isFile){

      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),1000);return;
    }catch(e){}
  }
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';

  const cb=document.createElement('button');cb.textContent='📋 复制全部';cb.className='btn btn-y';cb.style.flex='1';
  cb.onclick=()=>{navigator.clipboard.writeText(text).then(()=>{cb.textContent='✅ 已复制！';setTimeout(()=>{cb.textContent='📋 复制全部';},2000);}).catch(()=>{ta.select();document.execCommand('copy');cb.textContent='✅ 已复制！';});};
  const cl=document.createElement('button');cl.textContent='关闭';cl.className='btn btn-s';cl.onclick=()=>document.body.removeChild(ov);
  br.appendChild(cb);br.appendChild(cl);box.appendChild(ta);box.appendChild(br);ov.appendChild(box);document.body.appendChild(ov);ta.select();

function renderAdmin(){

        const e=norm[k];
        html+=e?`<div class="nb"><div class="nbl">${l}</div><div class="nbv">${Math.round(e.mean*1000)/1000}</div><div class="nbs">±${Math.round(e.sd*1000)/1000}·n=${e.n}</div></div>`:`<div class="nb"><div class="nbl">${l}</div><div style="color:rgba(255,255,255,.25);font-size:.72rem">不足</div></div>`;

    const qCol=q=>q===null?'#7ec8e3':flagQuotient(q)==='ok'?'#06d6a0':'#ffd166';

  }).join('');
}
